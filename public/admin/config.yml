# 线上：用 GitHub 登录（Netlify Function 提供 /auth）。
# base_url 在 Netlify 构建时由 scripts/write-admin-base-url.mjs 自动写入站点地址。
# 已移除「语言」字段：文章中英文可混写，无需选择语言。
backend:
  name: github
  repo: Ccwevelyn/beenthere-notes
  branch: main
  base_url: http://localhost:4321
  auth_endpoint: auth

local_backend: true
locale: zh_Hans
publish_mode: simple
media_folder: public/uploads
public_folder: /uploads

collections:
  - name: notes
    label: 文章
    label_singular: 文章
    folder: src/content/notes
    create: true
    extension: md
    format: frontmatter
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} · {{course}}"
    fields:
      - { label: 标题, name: title, widget: string }
      - label: 类型
        name: type
        widget: select
        default: note
        options:
          - { label: 笔记, value: note }
          - { label: Tip, value: tip }
        hint: Tip 会出现在课程页的 Tips 区；可不上传 PDF，只写文字即可。
      - label: 摘要
        name: description
        widget: text
        required: false
        hint: 显示在文章标题下方，列表页也会用到；可不填。
      - label: 正文
        name: body
        widget: markdown
        required: false
        hint: 可只写文字（Tip 常用）。也可粘贴语雀 Markdown；需要时再在下方上传 PDF。
      - label: PDF / 图片附件（可选，可不填）
        name: attachments
        widget: list
        required: false
        allow_add: true
        hint: Tip / 笔记都可不上传附件，直接发布。
        summary: "{{fields.label}}"
        fields:
          - { label: 名称, name: label, widget: string, default: "PDF", required: false }
          - { label: 文件, name: file, widget: file, required: false }
      - label: 年级
        name: grade
        widget: select
        options:
          - { label: 大一, value: year-1 }
          - { label: 大二, value: year-2 }
          - { label: 大三, value: year-3 }
          - { label: 大四, value: year-4 }
      - label: 学期
        name: semester
        widget: select
        options:
          - { label: 上学期, value: fall }
          - { label: 下学期, value: spring }
      - label: 课程
        name: course
        widget: select
        options:
          - { label: 微积分, value: calculus }
          - { label: 程序设计基础, value: programming }
          - { label: "COMP2111 · 数据库设计", value: database-design }
          - { label: "COMP2112 · 数据结构与算法", value: data-structures-algorithms }
          - { label: "COMP2113 · 操作系统", value: operating-systems }
          - { label: "COMP2114 · 电脑专业道德概论", value: ethics-professional-issues }
          - { label: "COMP2115 · 网页设计与开发", value: web-design-development }
          - { label: "COMP2116 · 软件工程", value: software-engineering }
          - { label: "COMP2117 · 电脑网络", value: computer-networks }
          - { label: "COMP3112 · 项目管理", value: project-management }
          - { label: "COMP3115 · 人机接口技术", value: human-factors-user-interfaces }
          - { label: "MENG3111 · 科学传播", value: science-communications }
          - { label: "COMP3122 · 进阶网页应用开发", value: advanced-web-development }
          - { label: "COMP3116 · 数据驱动商业管理", value: data-driven-business-management }
          - { label: "MSEL3109 · 商业危机管理导论", value: risk-management-business }
          - { label: "COMP3113 · 人工智能", value: artificial-intelligence }
          - { label: "COMP3114 · 信息系统项目", value: information-system-project }
          - { label: "COMP3117 · 分析数据设计与应用", value: analytical-data-design-applications }
          - { label: "COMP3118 · 数据科学与商业分析", value: data-science-business-analytics }
          - { label: "MSEL3107 · 人际关系", value: interpersonal-relations }
      - { label: 发布日期, name: date, widget: datetime, date_format: YYYY-MM-DD, time_format: false }
      - label: 显示顺序
        name: order
        widget: number
        default: 100
        value_type: int
        hint: 数字越小越靠前（1 最先）。相同顺序时按发布日期从新到旧。
      - { label: 发布, name: published, widget: hidden, default: true }
