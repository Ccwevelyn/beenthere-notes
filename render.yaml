services:
  - type: web
    name: beenthere-notes
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: SITE_URL
        value: https://beenthere-notes.onrender.com
      - key: PUBLIC_VIEWS_API_URL
        value: https://beenthere-notes-api.onrender.com
    routes:
      - type: redirect
        source: /
        destination: /zh/

  - type: web
    name: beenthere-notes-api
    runtime: node
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: npm run start:api
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: beenthere-notes-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://beenthere-notes.onrender.com
      - key: API_BASE_URL
        value: https://beenthere-notes-api.onrender.com
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false

databases:
  - name: beenthere-notes-db
    plan: free
    databaseName: beenthere_notes
    user: beenthere_notes
